openapi: 3.0.3
info:
  title: ReboisGabon API
  version: 1.0.0
  description: API de gestion des programmes de reboisement au Gabon
paths:
  /api/auth/2fa/disable/:
    post:
      operationId: auth_2fa_disable_create
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/2fa/setup/confirm/:
    post:
      operationId: auth_2fa_setup_confirm_create
      description: Confirme l'activation de la 2FA après scan du QR code et saisie
        du 1er code.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/2fa/setup/init/:
    post:
      operationId: auth_2fa_setup_init_create
      description: Génère (ou régénère) le secret TOTP et renvoie l'URI de provisioning
        (QR code).
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Étape 1 : email + mot de passe.
        - Si 2FA désactivée -> renvoie directement les tokens JWT.
        - Si 2FA activée -> renvoie un temp_token à usage unique, à fournir avec le code OTP.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/login/2fa/verify/:
    post:
      operationId: auth_login_2fa_verify_create
      description: 'Étape 2 : vérifie le code TOTP et délivre les vrais tokens JWT.'
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Infos du user connecté — pratique pour le client JavaFX après login.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/password/forgot/:
    post:
      operationId: auth_password_forgot_create
      description: Génère un token unique, envoyé par email, expirant dans 1h.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      description: Réinitialise le mot de passe via le token reçu, puis l'invalide.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/budgets-campagne/:
    get:
      operationId: budgets_campagne_list
      description: |-
        Pas de création directe : le budget se crée automatiquement à la volée
        (get_or_create) lors du premier PATCH pour une campagne donnée.
      parameters:
      - in: query
        name: campagne
        schema:
          type: string
          format: uuid
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - budgets-campagne
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBudgetCampagneList'
          description: ''
    post:
      operationId: budgets_campagne_create
      description: |-
        Pas de création directe : le budget se crée automatiquement à la volée
        (get_or_create) lors du premier PATCH pour une campagne donnée.
      tags:
      - budgets-campagne
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCampagne'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BudgetCampagne'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BudgetCampagne'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCampagne'
          description: ''
  /api/budgets-campagne/{id}/:
    get:
      operationId: budgets_campagne_retrieve
      description: |-
        Pas de création directe : le budget se crée automatiquement à la volée
        (get_or_create) lors du premier PATCH pour une campagne donnée.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Budget de
          campagne.
        required: true
      tags:
      - budgets-campagne
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCampagne'
          description: ''
    put:
      operationId: budgets_campagne_update
      description: |-
        Pas de création directe : le budget se crée automatiquement à la volée
        (get_or_create) lors du premier PATCH pour une campagne donnée.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Budget de
          campagne.
        required: true
      tags:
      - budgets-campagne
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCampagne'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BudgetCampagne'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BudgetCampagne'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCampagne'
          description: ''
    patch:
      operationId: budgets_campagne_partial_update
      description: |-
        Pas de création directe : le budget se crée automatiquement à la volée
        (get_or_create) lors du premier PATCH pour une campagne donnée.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Budget de
          campagne.
        required: true
      tags:
      - budgets-campagne
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBudgetCampagne'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBudgetCampagne'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBudgetCampagne'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCampagne'
          description: ''
    delete:
      operationId: budgets_campagne_destroy
      description: |-
        Pas de création directe : le budget se crée automatiquement à la volée
        (get_or_create) lors du premier PATCH pour une campagne donnée.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Budget de
          campagne.
        required: true
      tags:
      - budgets-campagne
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/calendrier-suivis/:
    get:
      operationId: calendrier_suivis_retrieve
      description: |-
        Vue calendrier : tous les suivis programmés dans les prochains jours.
        Utile pour un écran 'planning terrain' côté JavaFX.
      tags:
      - calendrier-suivis
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/campagnes/:
    get:
      operationId: campagnes_list
      parameters:
      - in: query
        name: date_debut
        schema:
          type: string
          format: date
      - in: query
        name: date_fin
        schema:
          type: string
          format: date
      - in: query
        name: essence
        schema:
          type: string
          format: uuid
      - in: query
        name: essence_nom
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      - in: query
        name: site
        schema:
          type: string
          format: uuid
      - in: query
        name: site_nom
        schema:
          type: string
      - in: query
        name: taux_survie_max
        schema:
          type: number
      - in: query
        name: taux_survie_min
        schema:
          type: number
      tags:
      - campagnes
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampagnePlantationListList'
          description: ''
    post:
      operationId: campagnes_create
      tags:
      - campagnes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampagnePlantationWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampagnePlantationWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampagnePlantationWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampagnePlantationWrite'
          description: ''
  /api/campagnes/{id}/:
    get:
      operationId: campagnes_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Campagne de plantation.
        required: true
      tags:
      - campagnes
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampagnePlantationList'
          description: ''
    put:
      operationId: campagnes_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Campagne de plantation.
        required: true
      tags:
      - campagnes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampagnePlantationWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampagnePlantationWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampagnePlantationWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampagnePlantationWrite'
          description: ''
    patch:
      operationId: campagnes_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Campagne de plantation.
        required: true
      tags:
      - campagnes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCampagnePlantationWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCampagnePlantationWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCampagnePlantationWrite'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampagnePlantationWrite'
          description: ''
    delete:
      operationId: campagnes_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Campagne de plantation.
        required: true
      tags:
      - campagnes
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/dashboard/alertes/:
    get:
      operationId: dashboard_alertes_retrieve
      description: |-
        Signaux d'alerte automatiques : sites/campagnes sous un seuil critique de survie,
        ou sans suivi récent. Argument de vente fort pour un jury : l'API ne fait pas
        que restituer des données, elle aide à la décision.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/carte-provinces/:
    get:
      operationId: dashboard_carte_provinces_retrieve
      description: Agrégation géographique enrichie — centroïde par province + statistiques,
        pour affichage carte-choroplèthe.
      summary: Statistiques géographiques agrégées par province (pour carte)
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/essences/:
    get:
      operationId: dashboard_essences_retrieve
      description: Performance comparée par essence — quelle espèce survit le mieux
        au Gabon.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/evolution/:
    get:
      operationId: dashboard_evolution_retrieve
      description: |-
        Évolution mensuelle : plantations et taux de survie dans le temps.
        C'est le graphique en courbe que les décideurs adorent voir en réunion.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/financier/:
    get:
      operationId: dashboard_financier_retrieve
      description: |-
        Vue financière globale — combien a été investi, par qui, où va l'argent,
        et le rendement réel (coût par plant survivant). C'est l'écran qui parle
        directement aux bailleurs et décideurs financiers.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/objectifs/:
    get:
      operationId: dashboard_objectifs_retrieve
      description: |-
        Vue synthétique de tous les objectifs actifs — le tableau de bord
        que les décideurs consultent en priorité pour suivre les engagements.
      summary: Vue d'ensemble des objectifs (progression, retards)
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/overview/:
    get:
      operationId: dashboard_overview_retrieve
      description: |-
        Vue d'ensemble globale — carte de synthèse en haut du dashboard.
        C'est le premier écran que verra le décideur.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/provinces/:
    get:
      operationId: dashboard_provinces_retrieve
      description: Vue géographique agrégée — utile pour une carte / répartition régionale.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/responsables/:
    get:
      operationId: dashboard_responsables_retrieve
      description: Performance par agent responsable — utile en interne pour évaluer
        les équipes terrain.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/scores-ecologiques/:
    get:
      operationId: dashboard_scores_ecologiques_retrieve
      description: |-
        Classement global — permet à un décideur d'identifier immédiatement
        les sites exemplaires (à valoriser auprès des bailleurs) et les sites
        qui nécessitent une intervention.
      summary: Classement de tous les sites par score écologique
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/sites/:
    get:
      operationId: dashboard_sites_retrieve
      description: |-
        Classement des sites par performance — top et flop.
        Très utile pour un décideur qui veut savoir où réallouer les moyens.
      tags:
      - dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/essences/:
    get:
      operationId: essences_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      tags:
      - essences
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEssenceList'
          description: ''
    post:
      operationId: essences_create
      tags:
      - essences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Essence'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Essence'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Essence'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Essence'
          description: ''
  /api/essences/{id}/:
    get:
      operationId: essences_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Essence.
        required: true
      tags:
      - essences
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Essence'
          description: ''
    put:
      operationId: essences_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Essence.
        required: true
      tags:
      - essences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Essence'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Essence'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Essence'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Essence'
          description: ''
    patch:
      operationId: essences_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Essence.
        required: true
      tags:
      - essences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEssence'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEssence'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEssence'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Essence'
          description: ''
    delete:
      operationId: essences_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Un(une) Chaîne UUID identifiant ce(cette) Essence.
        required: true
      tags:
      - essences
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/exports/campagnes/excel/:
    get:
      operationId: exports_campagnes_excel_retrieve
      tags:
      - exports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/exports/financements/excel/:
    get:
      operationId: exports_financements_excel_retrieve
      tags:
      - exports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/exports/rapport-financier/pdf/:
    get:
      operationId: exports_rapport_financier_pdf_retrieve
      tags:
      - exports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/exports/rapport-synthese/pdf/:
    get:
      operationId: exports_rapport_synthese_pdf_retrieve
      description: |-
        Génère le PDF de synthèse générale en réutilisant la logique du dashboard
        (pas de duplication de requêtes : on appelle directement les mêmes calculs).
      tags:
      - exports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/exports/sites/excel/:
    get:
      operationId: exports_sites_excel_retrieve
      tags:
      - exports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/financements/:
    get:
      operationId: financements_list
      parameters:
      - in: query
        name: campagne
        schema:
          type: string
          format: uuid
      - in: query
        name: date_debut
        schema:
          type: string
          format: date
      - in: query
        name: date_fin
        schema:
          type: string
          format: date
      - in: query
        name: devise
        schema:
          type: string
          enum:
          - EUR
          - USD
          - XAF
        description: |-
          * `XAF` - Franc CFA (XAF)
          * `EUR` - Euro
          * `USD` - Dollar US
      - in: query
        name: montant_max
        schema:
          type: number
      - in: query
        name: montant_min
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - in: query
        name: partenaire
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      - in: query
        name: site
        schema:
          type: string
          format: uuid
