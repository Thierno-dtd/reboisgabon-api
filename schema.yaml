        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - localite
      - nom
      - nombre_campagnes
      - responsable_nom
      - superficie_hectares
      - taux_survie_moyen
      - updated_at
    SiteReboisementWrite:
      type: object
      description: 'Création / modification : champs simples uniquement.'
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nom:
          type: string
          maxLength: 150
        localite:
          type: string
          maxLength: 150
        province:
          type: string
          maxLength: 100
        superficie_hectares:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        statut:
          $ref: '#/components/schemas/StatutC2fEnum'
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        responsable:
          type: string
          format: uuid
          nullable: true
      required:
      - id
      - localite
      - nom
      - superficie_hectares
    StatutC2fEnum:
      enum:
      - PLANIFIE
      - EN_COURS
      - TERMINE
      - SUSPENDU
      type: string
      description: |-
        * `PLANIFIE` - Planifié
        * `EN_COURS` - En cours
        * `TERMINE` - Terminé
        * `SUSPENDU` - Suspendu
    SuiviCroissance:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        campagne:
          type: string
          format: uuid
        campagne_info:
          type: string
          readOnly: true
        site_nom:
          type: string
          readOnly: true
        essence_nom:
          type: string
          readOnly: true
        date_controle:
          type: string
          format: date
        taux_survie:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          description: Pourcentage de plants ayant survécu (0 à 100).
        nombre_plants_vivants:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        observations:
          type: string
        controle_par:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - campagne
      - campagne_info
      - created_at
      - date_controle
      - essence_nom
      - id
      - site_nom
      - taux_survie
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TypeNotificationEnum:
      enum:
      - TAUX_CRITIQUE
      - SUIVI_EN_RETARD
      - SUIVI_A_VENIR
      - NOUVEAU_FINANCEMENT
      - COMPTE_CREE
      type: string
      description: |-
        * `TAUX_CRITIQUE` - Taux de survie critique
        * `SUIVI_EN_RETARD` - Suivi en retard
        * `SUIVI_A_VENIR` - Suivi programmé bientôt
        * `NOUVEAU_FINANCEMENT` - Nouveau financement reçu
        * `COMPTE_CREE` - Compte créé
    TypePartenaireEnum:
      enum:
      - ONG
