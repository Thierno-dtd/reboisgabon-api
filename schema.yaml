components:
  schemas:
    ActionEnum:
      enum:
      - CREATION
      - MODIFICATION
      - SUPPRESSION
      - CONNEXION
      - CONNEXION_ECHOUEE
      - DESACTIVATION
      type: string
      description: |-
        * `CREATION` - Création
        * `MODIFICATION` - Modification
        * `SUPPRESSION` - Suppression
        * `CONNEXION` - Connexion
        * `CONNEXION_ECHOUEE` - Connexion échouée
        * `DESACTIVATION` - Désactivation de compte
    BudgetCampagne:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        campagne:
          type: string
          format: uuid
        campagne_info:
          type: string
          readOnly: true
        budget_alloue:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        cout_reel:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        devise:
          $ref: '#/components/schemas/DeviseEnum'
        ecart_budgetaire:
          type: string
          readOnly: true
        cout_par_plant_survivant:
          type: string
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - campagne
      - campagne_info
      - cout_par_plant_survivant
      - ecart_budgetaire
      - id
      - updated_at
    CampagnePlantationList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        site:
          type: string
          format: uuid
        site_nom:
          type: string
          readOnly: true
        essence:
          type: string
          format: uuid
        essence_nom:
          type: string
          readOnly: true
        date_plantation:
          type: string
          format: date
        nombre_plants:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        responsable:
          type: string
          format: uuid
          nullable: true
        taux_survie_moyen:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date_plantation
      - essence
      - essence_nom
      - id
      - nombre_plants
      - site
      - site_nom
      - taux_survie_moyen
      - updated_at
    CampagnePlantationWrite:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        site:
          type: string
          format: uuid
        essence:
          type: string
          format: uuid
        date_plantation:
          type: string
          format: date
        nombre_plants:
